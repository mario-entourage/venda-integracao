runConfig:
  minInstances: 0
  maxInstances: 4
  cpu: 1
  memoryMiB: 512
  concurrency: 100

env:
  # ── Public / non-sensitive values ────────────────────────────────────────────
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBD_dVs2kB4d4IVp7w31XW0eLtv8rIpanc"

  - variable: NEXT_PUBLIC_APP_NAME
    value: "Entourage Lab"
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://app.entouragelab.com"

  # Default values — override per-environment if needed
  - variable: PAYMENT_LINK_EXPIRATION_HOURS
    value: "24"
  - variable: GLOBALPAYS_MERCHANT_CODE
    value: "4912"

  # ── Secrets — create with: firebase apphosting:secrets:set <NAME> ────────────
  # Google AI (Gemini) — required for AI prescription & document features
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY

  # GlobalPay
  # Sandbox: https://apihml.tryglobalpays.com/v1
  # Production: https://api.tryglobalpays.com/v1
  - variable: GLOBALPAY_API_URL
    secret: GLOBALPAY_API_URL
  - variable: GLOBALPAY_PUB_KEY
    secret: GLOBALPAY_PUB_KEY

  # ZapSign
  # Sandbox: https://sandbox.api.zapsign.com.br
  # Production: https://api.zapsign.com.br
  - variable: ZAPSIGN_API_URL
    value: "https://sandbox.api.zapsign.com.br"
  - variable: ZAPSIGN_API_KEY
    secret: ZAPSIGN_API_KEY
